<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - PlantDoc</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb2b8",
                        "primary-fixed": "#82faab",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-fixed-variant": "#00522b",
                        "on-background": "#191c1d",
                        "surface-container-highest": "#e1e3e4",
                        "on-surface-variant": "#3e4a3f",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#eff1f2",
                        "tertiary": "#a23546",
                        "background": "#f8fafb",
                        "on-error": "#ffffff",
                        "primary-container": "#008649",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#f6fff4",
                        "primary-fixed-dim": "#64dd91",
                        "inverse-primary": "#64dd91",
                        "secondary-container": "#c6e4f4",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#c9e7f7",
                        "tertiary-fixed": "#ffdadb",
                        "surface-container-low": "#f2f4f5",
                        "surface-container": "#eceeef",
                        "secondary": "#466270",
                        "on-surface": "#191c1d",
                        "surface-variant": "#e1e3e4",
                        "surface-container-high": "#e6e8e9",
                        "surface-dim": "#d8dadb",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#c24d5e",
                        "surface-bright": "#f8fafb",
                        "secondary-fixed-dim": "#adcbda",
                        "on-tertiary-fixed": "#40000f",
                        "surface": "#f8fafb",
                        "outline-variant": "#bdcabc",
                        "outline": "#6d7a6f",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "surface-tint": "#006d3a",
                        "on-tertiary-fixed-variant": "#851f33",
                        "on-secondary-fixed-variant": "#2e4b57",
                        "on-secondary-container": "#4a6774",
                        "primary": "#006a39",
                        "on-primary-fixed": "#00210e",
                        "on-secondary-fixed": "#001f2a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-background h-screen flex overflow-hidden">
<!-- Left Side: Image -->
<div class="hidden lg:block lg:w-1/2 relative">
<img alt="Farming Image" class="absolute inset-0 w-full h-full object-cover" data-alt="Reset password cover image" src="assets/reset-password.png"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
<div class="absolute bottom-12 left-12 right-12 text-on-primary">
<h2 class="font-headline text-4xl font-bold mb-4">Cultivate Better Crops.</h2>
<p class="font-body text-lg opacity-90">Recover your account and get back to managing your farm's health with PlantDoc's advanced analytics.</p>
</div>
</div>
<!-- Right Side: Form -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 lg:p-24 bg-surface relative">
<!-- Subtle Background Decoration -->
<div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-primary-container/20 blur-3xl z-0 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-secondary-container/20 blur-3xl z-0 pointer-events-none"></div>
<div class="w-full max-w-md relative z-10 bg-surface-container-lowest p-8 sm:p-10 rounded-xl shadow-sm border border-outline-variant/30">
<!-- Brand / Header -->
<div class="mb-8 text-center sm:text-left">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-primary-container text-on-primary-container mb-6 shadow-sm">
<span class="material-symbols-outlined text-2xl" data-icon="lock_reset">lock_reset</span>
</div>
<h1 class="font-headline text-3xl font-bold text-on-surface mb-2">Reset Password</h1>
<p class="font-body text-on-surface-variant text-sm">
                    Enter the email address associated with your PlantDoc account, and we'll send you a link to reset your password.
                </p>
</div>
<!-- Form -->
<form class="space-y-6" id="reset-request-form">
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-lg" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface placeholder-outline focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="email" name="email" placeholder="farmer@example.com" required="" type="email"/>
</div>
</div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-on-primary bg-primary hover:bg-primary-container hover:text-on-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200" type="submit">
                    Send Reset Link
                </button>
</form>

<!-- Step 2: Confirm code + set new password -->
<form class="space-y-6 hidden mt-6" id="reset-confirm-form">
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface" for="code">Reset Code</label>
<input class="block w-full px-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface placeholder-outline focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="code" name="code" placeholder="123456" inputmode="numeric" autocomplete="one-time-code" required="" />
</div>
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface" for="new_password">New Password</label>
<input class="block w-full px-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface placeholder-outline focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="new_password" name="new_password" placeholder="••••••••" type="password" required="" />
</div>
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface" for="confirm_new_password">Confirm New Password</label>
<input class="block w-full px-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface placeholder-outline focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="confirm_new_password" name="confirm_new_password" placeholder="••••••••" type="password" required="" />
</div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-on-primary bg-primary hover:bg-primary-container hover:text-on-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200" type="submit">
                    Reset Password
                </button>
</form>
<!-- Actions -->
<div class="mt-8 pt-6 border-t border-outline-variant/30 text-center">
<a class="inline-flex items-center font-body text-sm font-medium text-primary hover:text-primary-fixed-dim transition-colors group" href="login.html">
<span class="material-symbols-outlined text-lg mr-1 group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
                    Back to Login
                </a>
</div>
</div>
</div>

    <script src="api.js"></script>
    <script src="./forgetPassword.js"></script>
</body></html>
