<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PlantDoc - All Validated Cases</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top_left,_rgba(16,185,129,0.12),_transparent_28%),radial-gradient(circle_at_bottom_right,_rgba(59,130,246,0.10),_transparent_25%),linear-gradient(180deg,_#f7fbf8_0%,_#f3f7f5_46%,_#eef4f1_100%)] text-slate-900">
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
        <section class="relative overflow-hidden rounded-[32px] border border-white/70 bg-white/85 shadow-[0_22px_80px_-34px_rgba(15,23,42,0.28)] backdrop-blur-sm">
            <div class="absolute inset-0 pointer-events-none bg-[linear-gradient(125deg,rgba(16,185,129,0.08),transparent_34%,rgba(14,165,233,0.05))]"></div>

            <div class="relative px-5 sm:px-8 lg:px-10 py-7 sm:py-9 border-b border-slate-200/80">
                <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
                    <div class="flex items-start gap-4 sm:gap-5">
                        <div class="shrink-0 rounded-[24px] border border-emerald-100 bg-white p-3 shadow-sm">
                            <img src="/frontend/expert/logo dark.png" alt="PlantDoc logo" class="w-16 h-16 sm:w-20 sm:h-20 object-contain" />
                        </div>
                        <div class="max-w-2xl">
                            <span class="inline-flex items-center gap-2 rounded-full border border-emerald-100 bg-emerald-50 px-3 py-1 text-[11px] font-bold uppercase tracking-[0.28em] text-emerald-700">
                                <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                                PlantDoc Expert
                            </span>
                            <h1 class="mt-4 text-3xl sm:text-4xl font-black tracking-tight text-slate-950">All Validated Cases</h1>
                            <p class="mt-3 text-sm sm:text-base leading-7 text-slate-600">
                                Browse every completed expert validation in one polished workspace, with real case images, confidence insight, and fast filtering.
                            </p>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 sm:items-center">
                        <button data-filter-toggle class="inline-flex items-center justify-center gap-2 rounded-2xl border border-slate-200 bg-white px-5 py-3.5 text-sm font-bold text-slate-700 shadow-sm transition-all hover:bg-slate-50">
                            <span class="material-symbols-outlined text-[18px]">filter_alt</span>
                            Filter
                        </button>
                        <button data-back-dashboard class="inline-flex items-center justify-center gap-2 rounded-2xl bg-emerald-700 px-5 py-3.5 text-sm font-bold text-white shadow-[0_12px_30px_-16px_rgba(4,120,87,0.9)] transition-all hover:bg-emerald-800 hover:-translate-y-0.5">
                            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                            Back to Dashboard
                        </button>
                    </div>
                </div>
            </div>

            <div class="relative px-5 sm:px-8 lg:px-10 pt-5 pb-3">
                <p data-active-filters class="text-sm font-medium text-slate-500"></p>
            </div>

            <div data-cases-grid class="relative grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 px-5 sm:px-8 lg:px-10 pb-8">
                <div class="rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm animate-pulse h-[430px]"></div>
                <div class="rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm animate-pulse h-[430px]"></div>
                <div class="rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm animate-pulse h-[430px]"></div>
            </div>

            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between px-5 sm:px-8 lg:px-10 py-5 border-t border-slate-200 bg-slate-50/75">
                <p data-pagination-summary class="text-sm font-medium text-slate-500">Loading...</p>
                <div class="flex items-center gap-2 self-end sm:self-auto">
                    <button data-prev-page class="rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm transition-colors hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed">
                        Previous
                    </button>
                    <button data-next-page class="rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm transition-colors hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed">
                        Next
                    </button>
                </div>
            </div>
        </section>
    </main>

    <div data-filter-modal class="hidden fixed inset-0 z-[9999] bg-black/40 backdrop-blur-sm p-4 flex items-center justify-center">
        <div class="w-full max-w-lg rounded-[28px] bg-white shadow-2xl border border-slate-200 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-200 flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-extrabold text-slate-900">Filter validated cases</h2>
                    <p class="text-sm text-slate-500 mt-1">Refine the case gallery by crop, severity, and date order.</p>
                </div>
                <button data-filter-close class="text-slate-400 hover:text-slate-700 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <div class="px-6 py-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label for="filter-crop" class="block text-sm font-semibold text-slate-700 mb-2">Crop</label>
                    <input id="filter-crop" type="text" placeholder="e.g. Tomato" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:border-emerald-500 focus:ring-emerald-500" />
                </div>
                <div>
                    <label for="filter-severity" class="block text-sm font-semibold text-slate-700 mb-2">Severity</label>
                    <select id="filter-severity" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:border-emerald-500 focus:ring-emerald-500">
                        <option value="">All severities</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
                <div>
                    <label for="filter-sort" class="block text-sm font-semibold text-slate-700 mb-2">Date</label>
                    <select id="filter-sort" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:border-emerald-500 focus:ring-emerald-500">
                        <option value="newest">Newest first</option>
                        <option value="oldest">Oldest first</option>
                    </select>
                </div>
            </div>

            <div class="px-6 py-5 border-t border-slate-200 flex gap-3">
                <button data-filter-clear class="flex-1 rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
                    Clear
                </button>
                <button data-filter-apply class="flex-1 rounded-2xl bg-emerald-700 px-4 py-3 text-sm font-bold text-white hover:bg-emerald-800 transition-colors">
                    Apply
                </button>
            </div>
        </div>
    </div>

    <script src="/frontend/api.js"></script>
    <script src="/frontend/expert/expertCases.js"></script>
</body>
</html>
