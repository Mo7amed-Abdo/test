<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Notifications - PlantDoc</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config={darkMode:"class",theme:{extend:{colors:{"surface-container":"#eceeef","surface-variant":"#e1e3e4","on-background":"#191c1d","background":"#f8fafb","primary":"#006a39","on-tertiary-fixed":"#40000f","outline-variant":"#bdcabc","on-error-container":"#93000a","surface-container-low":"#f2f4f5","secondary-container":"#c6e4f4","on-error":"#ffffff","on-primary-fixed":"#00210e","surface-container-lowest":"#ffffff","error":"#ba1a1a","tertiary-fixed":"#ffdadb","on-surface-variant":"#3e4a3f","primary-fixed-dim":"#64dd91","outline":"#6d7a6f","inverse-on-surface":"#eff1f2","secondary-fixed-dim":"#adcbda","inverse-surface":"#2e3132","surface-tint":"#006d3a","tertiary":"#a23546","on-secondary":"#ffffff","surface":"#f8fafb","secondary":"#466270","primary-fixed":"#82faab","tertiary-container":"#c24d5e","surface-dim":"#d8dadb","surface-container-highest":"#e1e3e4","on-tertiary-fixed-variant":"#851f33","on-secondary-container":"#4a6774","surface-bright":"#f8fafb","on-secondary-fixed":"#001f2a","surface-container-high":"#e6e8e9","error-container":"#ffdad6","on-primary":"#ffffff","tertiary-fixed-dim":"#ffb2b8","on-primary-fixed-variant":"#00522b","on-surface":"#191c1d","secondary-fixed":"#c9e7f7","on-secondary-fixed-variant":"#2e4b57","on-primary-container":"#f6fff4","primary-container":"#008649","on-tertiary-container":"#fffbff","on-tertiary":"#ffffff","inverse-primary":"#64dd91"},borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},fontFamily:{"headline":["Inter"],"body":["Inter"],"label":["Inter"]}}}}
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; user-select: none; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        /* ── Notification card transitions ── */
        .notif-item {
            transition: background-color 0.25s ease, box-shadow 0.2s ease, transform 0.15s ease;
            animation: notifIn 0.3s ease both;
        }
        .notif-item:hover { transform: translateY(-1px); box-shadow: 0 4px 16px -4px rgba(0,106,57,0.12); }
        .notif-item:nth-child(1)  { animation-delay: 0.03s; }
        .notif-item:nth-child(2)  { animation-delay: 0.06s; }
        .notif-item:nth-child(3)  { animation-delay: 0.09s; }
        .notif-item:nth-child(4)  { animation-delay: 0.12s; }
        .notif-item:nth-child(5)  { animation-delay: 0.15s; }
        .notif-item:nth-child(6)  { animation-delay: 0.18s; }

        @keyframes notifIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Read/unread indicator ── */
        .notif-item .unread-bar { transition: opacity 0.3s ease, width 0.3s ease; }
        .notif-item .unread-dot { transition: opacity 0.25s ease, transform 0.25s ease; }
        .notif-item.is-read .unread-bar { opacity: 0; width: 0 !important; }
        .notif-item.is-read .unread-dot { opacity: 0; transform: scale(0); }
        .notif-item.is-read .notif-icon-wrap { opacity: 0.55; }
        .notif-item.is-read .notif-content { opacity: 0.7; }
        .notif-icon-wrap, .notif-content { transition: opacity 0.3s ease; }

        /* ── Filter tab active ── */
        .filter-tab.active {
            background: #006a39;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,106,57,0.25);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #bdcabc; border-radius: 9999px; }

        /* ── Section label fade-in ── */
        [data-notif-section] {
            animation: notifIn 0.25s ease both;
        }

        /* ── Skeleton shimmer ── */
        @keyframes shimmer {
            0%   { background-position: -500px 0; }
            100% { background-position:  500px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #eceeef 25%, #e4e6e7 50%, #eceeef 75%);
            background-size: 500px 100%;
            animation: shimmer 1.3s ease-in-out infinite;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex font-body">

    <!-- ══════════════════════════════════════════
         Sidebar — matches all other pages exactly
    ══════════════════════════════════════════ -->
    <nav class="bg-slate-50 text-sm font-medium fixed h-screen w-64 left-0 top-0 border-r border-slate-200 flex-col gap-2 hidden md:flex z-50">
        <div class="flex items-center gap-1">
            <div class="flex items-center">
                <img src="logo dark.png" alt="" class="w-26 h-28">
            </div>
            <span class="text-lg font-bold text-green-700">PlantDoc</span>
        </div>
        <div class="flex-1 flex flex-col gap-1 px-4">
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]" href="farmerdashboard.html">
                <span class="material-symbols-outlined">dashboard</span><span>Dashboard</span>
            </a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]" href="recendiagnoses.html">
                <span class="material-symbols-outlined">biotech</span><span>Diagnoses</span>
            </a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]" href="treatmentsolutions.html">
                <span class="material-symbols-outlined">medication</span><span>Treatments</span>
            </a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]" href="ordertracking.html">
                <span class="material-symbols-outlined">shopping_basket</span><span>Orders</span>
            </a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]" href="expertschat.html">
                <span class="material-symbols-outlined">forum</span><span>Chat with Expert</span>
            </a>
            <a class="bg-green-700 text-white rounded-xl px-4 py-3 flex items-center gap-3 active:scale-[0.98] transition-transform" href="#">
                <span class="material-symbols-outlined fill">notifications</span><span>Notifications</span>
            </a>
        </div>
        <div class="mt-auto pt-4 border-t border-slate-200 px-4 pb-5">
            <a class="rounded-xl px-3 py-2.5 flex items-center gap-3 bg-gradient-to-r from-green-100 to-emerald-50 border border-green-200 hover:from-green-200 hover:to-emerald-100 transition-all active:scale-[0.98] shadow-sm" href="farmerprofile.html">
                <img src="" class="w-9 h-9 rounded-full object-cover border-2 border-white shadow-sm shrink-0" alt="Profile" data-user-avatar />
                <div class="flex flex-col min-w-0">
                    <span class="font-bold text-green-900 text-sm truncate" data-user-name>Loading...</span>
                    <span class="text-xs text-green-700 truncate" data-user-role>Loading...</span>
                </div>
                <button class="ml-auto text-green-700 hover:text-green-900 transition-colors">
                    <span class="material-symbols-outlined text-lg">logout</span>
                </button>
            </a>
        </div>
    </nav>

    <!-- ══════════════════════════════════════════
         Mobile Header
    ══════════════════════════════════════════ -->
    <header class="md:hidden sticky top-0 z-40 flex h-14 w-full items-center justify-between px-4 bg-white border-b border-slate-200 shadow-sm">
        <span class="text-base font-bold text-on-surface">Notifications</span>
        <div class="flex items-center gap-1.5">
            <span id="unread-count" data-unread-count class="hidden px-2 py-0.5 bg-primary text-on-primary text-[10px] font-bold rounded-full">0</span>
            <button class="p-2 text-slate-500 hover:text-green-700 rounded-full transition-all">
                <span class="material-symbols-outlined fill text-[22px]">notifications</span>
            </button>
        </div>
    </header>

    <!-- ══════════════════════════════════════════
         Main Content
    ══════════════════════════════════════════ -->
    <main class="flex-1 md:ml-64 w-full">

        <!-- White top bar matching other pages -->
        <div class="bg-slate-50 px-4 md:px-7 pt-5 hidden md:block">
            <div class="mx-auto flex items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-on-surface font-headline">
                        <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-green-200/80 bg-gradient-to-r from-green-50 via-emerald-50 to-green-100 shadow-sm text-green-700">
                            <span class="material-symbols-outlined text-[18px]">notifications</span>
                            <span>Notifications</span>
                        </span>
                    </h1>
                </div>
                <!-- Mark all as read — onclick="markAllRead()" preserved for JS compatibility,
                     farmernotifications.js also rewires this via setupMarkAll() -->
                <button onclick="markAllRead()"
                    class="flex items-center gap-2 px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg text-sm font-medium text-on-surface hover:bg-surface-container transition-colors shadow-sm active:scale-[0.98]">
                    <span class="material-symbols-outlined text-[18px] text-primary">done_all</span>
                    Mark all as read
                </button>
            </div>
        </div>

        <div class="px-4 md:px-12 py-2 flex flex-col gap-5 mx-auto w-full mt-6">

            <!-- ── Filter Tabs ── -->
            <!-- data-filter-tab attributes preserved exactly for farmernotifications.js setupTabs() -->
            <div class="flex gap-2 flex-wrap border-t-2 border-primary rounded-xl pt-3">
                <button class="filter-tab active px-4 py-1.5 rounded-full text-sm font-semibold border border-transparent transition-all active:scale-[0.97]"
                        data-filter-tab="all">
                    All
                </button>
                <button class="filter-tab px-4 py-1.5 rounded-full text-sm font-medium border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition-all active:scale-[0.97]"
                        data-filter-tab="unread">
                    Unread
                    <!-- id="unread-count" and data-unread-count preserved for updateCount() -->
                    <span id="unread-count" data-unread-count class="hidden ml-1 px-1.5 py-0.5 bg-primary text-on-primary text-[10px] font-bold rounded-full">0</span>
                </button>
                <button class="filter-tab px-4 py-1.5 rounded-full text-sm font-medium border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition-all active:scale-[0.97]"
                        data-filter-tab="expert">
                    Expert Replies
                </button>
            </div>

            <!-- ── Notifications List ──
                 data-notifications-list is the primary selector used by
                 farmernotifications.js render(). The flex flex-col gap-3 class
                 is a fallback selector. Both are present here.
            ── -->
            <div data-notifications-list class="flex flex-col gap-3">
                <!-- Loading skeletons — replaced by JS on load -->
                <div class="flex flex-col gap-3">
                    <div class="skeleton h-4 w-20 rounded mb-1"></div>
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex items-start gap-4">
                        <div class="skeleton w-11 h-11 rounded-full shrink-0"></div>
                        <div class="flex-1 flex flex-col gap-2 py-0.5">
                            <div class="skeleton h-4 w-1/2 rounded"></div>
                            <div class="skeleton h-3 w-3/4 rounded"></div>
                            <div class="skeleton h-3 w-1/4 rounded"></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex items-start gap-4">
                        <div class="skeleton w-11 h-11 rounded-full shrink-0"></div>
                        <div class="flex-1 flex flex-col gap-2 py-0.5">
                            <div class="skeleton h-4 w-2/5 rounded"></div>
                            <div class="skeleton h-3 w-2/3 rounded"></div>
                            <div class="skeleton h-3 w-1/4 rounded"></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex items-start gap-4">
                        <div class="skeleton w-11 h-11 rounded-full shrink-0"></div>
                        <div class="flex-1 flex flex-col gap-2 py-0.5">
                            <div class="skeleton h-4 w-3/5 rounded"></div>
                            <div class="skeleton h-3 w-1/2 rounded"></div>
                            <div class="skeleton h-3 w-1/4 rounded"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="../api.js"></script>
    <script src="./farmernotifications.js"></script>
</body>
</html>
