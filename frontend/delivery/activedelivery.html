<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Active Orders - PlantDoc</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#eceeef",
                        "surface-variant": "#e1e3e4",
                        "on-background": "#191c1d",
                        "background": "#f8fafb",
                        "primary": "#006a39",
                        "on-tertiary-fixed": "#40000f",
                        "outline-variant": "#bdcabc",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f4f5",
                        "secondary-container": "#c6e4f4",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#00210e",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffdadb",
                        "on-surface-variant": "#3e4a3f",
                        "primary-fixed-dim": "#64dd91",
                        "outline": "#6d7a6f",
                        "inverse-on-surface": "#eff1f2",
                        "secondary-fixed-dim": "#adcbda",
                        "inverse-surface": "#2e3132",
                        "surface-tint": "#006d3a",
                        "tertiary": "#a23546",
                        "on-secondary": "#ffffff",
                        "surface": "#f8fafb",
                        "secondary": "#466270",
                        "primary-fixed": "#82faab",
                        "tertiary-container": "#c24d5e",
                        "surface-dim": "#d8dadb",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#851f33",
                        "on-secondary-container": "#4a6774",
                        "surface-bright": "#f8fafb",
                        "on-secondary-fixed": "#001f2a",
                        "surface-container-high": "#e6e8e9",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb2b8",
                        "on-primary-fixed-variant": "#00522b",
                        "on-surface": "#191c1d",
                        "secondary-fixed": "#c9e7f7",
                        "on-secondary-fixed-variant": "#2e4b57",
                        "on-primary-container": "#f6fff4",
                        "primary-container": "#008649",
                        "on-tertiary-container": "#fffbff",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#64dd91"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },

    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Filter modal */
        #filter-modal {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        #filter-modal.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.97) translateY(-6px);
        }
        #filter-modal:not(.hidden) {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        .filter-chip input:checked ~ .chip-label {
            background-color: #006a39;
            color: #ffffff;
            border-color: #006a39;
        }

        /* Order details modal */
        #order-modal-backdrop {
            transition: opacity 0.25s ease;
        }
        #order-modal-backdrop.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #order-modal-backdrop:not(.hidden) {
            opacity: 1;
        }
        #order-modal {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        #order-modal-backdrop.hidden #order-modal {
            opacity: 0;
            transform: scale(0.96) translateY(12px);
        }
        #order-modal-backdrop:not(.hidden) #order-modal {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Active order cards visual upgrade */
        .order-card {
            position: relative;
            overflow: hidden;
            transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
            animation: cardIn .45s ease both;
        }
        .order-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(100,221,145,.10), rgba(0,106,57,.04) 50%, rgba(100,221,145,.08));
            pointer-events: none;
        }
        .order-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #10b981, #059669, #34d399);
            opacity: .95;
        }
        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 34px -24px rgba(0,106,57,.45);
            border-color: rgba(0,106,57,.22);
        }
        .order-card .status-track > div {
            transition: all .35s ease;
        }
        .order-card:nth-child(1) { animation-delay: 0ms; }
        .order-card:nth-child(2) { animation-delay: 70ms; }
        .order-card:nth-child(3) { animation-delay: 140ms; }
        .order-card:nth-child(4) { animation-delay: 210ms; }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px) scale(.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Sidebar premium polish */
        .sidebar-elevated {
            background: linear-gradient(180deg, #f9fbfc 0%, #f3f6f8 100%);
            box-shadow:
                8px 0 28px -18px rgba(15, 23, 42, 0.35),
                2px 0 0 rgba(255,255,255,0.85) inset;
        }
        .sidebar-link {
            position: relative;
            border-radius: 14px;
            transition: transform .2s ease, background-color .2s ease, color .2s ease, box-shadow .2s ease;
        }
        .sidebar-link:hover {
            transform: translateX(3px);
            background: rgba(22, 163, 74, 0.10);
            color: #0b6b3a;
            box-shadow: 0 8px 20px -16px rgba(0, 106, 57, 0.55);
        }
        .sidebar-link-active {
            box-shadow:
                0 12px 24px -18px rgba(0, 106, 57, 0.85),
                0 0 0 1px rgba(255,255,255,.2) inset;
        }
        .sidebar-link-active::before {
            content: "";
            position: absolute;
            left: -8px;
            top: 18%;
            height: 64%;
            width: 4px;
            border-radius: 999px;
            background: linear-gradient(180deg, #86efac, #22c55e);
            box-shadow: 0 0 12px rgba(34,197,94,.55);
        }
        .sidebar-badge-pulse {
            animation: sidebarPulse 2.2s ease-in-out infinite;
            transform-origin: center;
        }
        @keyframes sidebarPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,.0); transform: scale(1); }
            50% { box-shadow: 0 0 0 7px rgba(34,197,94,.12); transform: scale(1.03); }
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex font-body">

    <!-- SideNavBar -->
    <nav class="sidebar-elevated bg-slate-50 text-green-600 font-inter text-sm font-medium fixed h-screen w-64 left-0 top-0 border-r border-slate-200 flex-col gap-2 hidden md:flex z-50">

        <!-- Logo -->
        <div class="flex items-center gap-1">
            <div class="flex items-center">
                <img src="logo dark.png" alt="" class="w-26 h-28">
            </div>
            <span class="text-lg font-bold text-green-700">PlantDoc</span>
        </div>

        <!-- Nav Links -->
        <div class="flex-1 flex flex-col gap-1 px-4 pt-3">
            <a class="sidebar-link text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 transition-all active:scale-[0.98]" href="deliverydashboard.html">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </a>
            <!-- Active Orders (ACTIVE) -->
            <a class="sidebar-link sidebar-link-active bg-green-700 text-white rounded-xl p-3 flex items-center gap-3 active:scale-[0.98] transition-transform" href="#">
                <span class="material-symbols-outlined fill">local_shipping</span>
                <span>Active Orders</span>
            </a>
            <a class="sidebar-link text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 transition-all active:scale-[0.98]" href="deliveryCompletedorders.html">
                <span class="material-symbols-outlined">task_alt</span>
                <span>Completed Orders</span>
            </a>
            <a class="sidebar-link text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 transition-all active:scale-[0.98]" href="notificationsdelivery.html">
                <span class="material-symbols-outlined">notifications</span>
                <span>Notifications</span>
            </a>
            <a class="sidebar-link text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 transition-all active:scale-[0.98]" href="deliveryprofile.html">
                <span class="material-symbols-outlined">person</span>
                <span>Profile</span>
            </a>
        </div>

        <!-- Profile card -->
        <div class="mt-auto pt-2 px-4 pb-5">
            <a class="sidebar-badge-pulse rounded-xl px-3 py-2.5 flex items-center gap-3 bg-gradient-to-r from-green-100 to-emerald-50 border border-green-200 hover:from-green-200 hover:to-emerald-100 transition-all active:scale-[0.98] shadow-sm"
                href="deliveryprofile.html">
                <img src="" class="w-9 h-9 rounded-full object-cover border-2 border-white shadow-sm shrink-0" alt="Profile"
                    data-user-avatar />
                <div class="flex flex-col min-w-0">
                    <span class="font-bold text-green-950 text-sm truncate" data-user-name>Loading...</span>
                    <span class="text-xs text-green-700 truncate" data-user-role>Loading...</span>
                </div>
                <button class="ml-auto text-green-700 hover:text-green-900 transition-colors">
                    <span class="material-symbols-outlined text-lg">logout</span>
                </button>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:ml-64 w-full">

        <!-- Mobile Header -->
        <header class="md:hidden sticky top-0 z-40 flex h-16 w-full items-center justify-between px-4 bg-gray-50 border-b border-slate-200 shadow-sm">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined fill text-primary text-2xl">spa</span>
                <h1 class="text-xl font-bold text-green-700">PlantDoc</h1>
            </div>
            <div class="flex items-center gap-2">
                <button class="p-2 text-slate-500 hover:text-green-600 transition-colors active:scale-95 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <button class="p-2 text-slate-500 hover:text-green-600 transition-colors active:scale-95 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">account_circle</span>
                </button>
            </div>
        </header>

        <div class="p-6 md:p-8 flex-1 overflow-y-auto">

            <!-- Page heading row -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">

                <!-- Left: title + subtitle -->
                <div class="shrink-0">
                    <h2 class="text-2xl font-bold text-on-surface">
                        <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-green-200/80 bg-gradient-to-r from-green-50 via-emerald-50 to-green-100 shadow-sm text-green-700">
                            <span class="material-symbols-outlined text-[18px]">local_shipping</span>
                            <span>Active Orders</span>
                        </span>
                    </h2>
                </div>

                <!-- Center: search -->
                <div class="flex-1 relative group mx-4 hidden md:block">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] pointer-events-none group-focus-within:text-primary transition-colors duration-200">search</span>
                    <input type="text" placeholder="Search orders..."
                        class="w-full bg-surface-container-low border border-surface-variant text-on-surface rounded-full pl-11 pr-5 py-2.5 text-sm font-medium placeholder:text-on-surface-variant/50 focus:ring-1 focus:ring-primary hover:border-primary focus:border-primary transition-colors duration-200" />
                </div>

                <!-- Right: notification + filter -->
                <div class="flex items-center gap-3 shrink-0">
                    <button data-filter class="group inline-flex items-center gap-2 px-4 py-2 rounded-full border border-green-200/80 bg-gradient-to-r from-green-50 via-emerald-50 to-green-100 shadow-sm text-green-700 text-sm font-bold hover:shadow-md hover:from-green-100 hover:to-emerald-100 transition-all active:scale-[0.98]">
                        <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-surface-container-lowest border border-green-200/70 shadow-sm group-hover:border-green-300/80 transition-colors">
                            <span class="material-symbols-outlined text-[18px]">filter_list</span>
                        </span>
                        <span>Filter</span>
                    </button>
                </div>
            </div>

            <!-- Orders Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 rounded-xl pt-2 border-t-2 border-primary" data-deliveries-grid>
                <p class="col-span-full text-center text-on-surface-variant py-16">Loading deliveries...</p>
            </div>
        </div>
    </main>

    <script src="../api.js"></script>
    <script src="./activedelivery.js"></script>
</body>
</html>
